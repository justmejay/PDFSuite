<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nicolle Suite</title>
  <!-- Modern typography -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <!-- Abstract animated background -->
  <div class="bg-mesh">
    <div class="gradient-sphere sphere-1"></div>
    <div class="gradient-sphere sphere-2"></div>
    <div class="gradient-sphere sphere-3"></div>
  </div>

  <div class="app-container">
    <!-- Suite Navigation Menu -->
    <nav class="suite-nav glass-panel">
      <div class="brand-mini">
        <i data-lucide="sparkles" class="brand-icon"></i>
      </div>
      <ul class="nav-links">
        <li class="nav-item active">
          <button class="nav-btn" title="Organize PDF">
            <i data-lucide="layers"></i>
            <span class="nav-label">Organize PDF</span>
          </button>
        </li>
        <li class="nav-item disabled">
          <button class="nav-btn" title="Coming Soon">
            <i data-lucide="file-text"></i>
            <span class="nav-label">Coming Soon</span>
          </button>
        </li>
      </ul>
    </nav>

    <!-- Sidebar / Toolbar -->
    <aside class="sidebar glass-panel">
      <div class="brand">
        <i data-lucide="layers" class="brand-icon"></i>
        <h1>Nics Suite</h1>
      </div>

      <div class="toolbar-section hidden" id="selection-toolbar">
        <p class="section-title">Selection Actions</p>
        <div class="action-grid">
          <button class="btn action-btn" id="btn-rotate-left" title="Rotate Left">
            <i data-lucide="rotate-ccw"></i>
            <span>Left</span>
          </button>
          <button class="btn action-btn" id="btn-rotate-right" title="Rotate Right">
            <i data-lucide="rotate-cw"></i>
            <span>Right</span>
          </button>
          <button class="btn action-btn danger" id="btn-delete" title="Delete Selection">
            <i data-lucide="trash-2"></i>
            <span>Delete</span>
          </button>
        </div>
      </div>

      <div class="toolbar-section hidden" id="export-toolbar">
        <p class="section-title">Export Options</p>
        <div class="export-options">
          <button class="btn export-btn primary" id="btn-export-one">
            <i data-lucide="merge"></i>
            <span>Merge PDF</span>
          </button>
          <button class="btn export-btn primary" id="btn-export-by-file" style="background-color: var(--accent-hover);">
            <i data-lucide="file-archive"></i>
            <span>Save by File (ZIP)</span>
          </button>
          <button class="btn export-btn" id="btn-export-burst">
            <i data-lucide="split-square-horizontal"></i>
            <span>Save by page (ZIP)</span>
          </button>
        </div>
      </div>

      <div class="toolbar-section bottom">
        <button class="btn action-btn" id="btn-add-more">
          <i data-lucide="file-plus-2"></i>
          <span>Add Files</span>
        </button>
        <button class="btn action-btn text-danger hidden" id="btn-clear-all">
          <i data-lucide="x-circle"></i>
          <span>Reset All</span>
        </button>
        <input type="file" id="file-input" multiple accept="application/pdf" class="hidden" />
      </div>
    </aside>

    <!-- Main Workspace -->
    <main class="workspace">
      <header class="workspace-header" style="align-items: flex-start;">
        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
          <h2>Pages Workspace</h2>
          <button class="btn" id="btn-select-all" style="padding: 0.35rem 0.65rem; font-size: 0.75rem; width: max-content; background: rgba(99, 102, 241, 0.1); border-color: rgba(99, 102, 241, 0.3);">
            <i data-lucide="check-square" style="width: 14px; height: 14px;"></i>
            <span>Select All</span>
          </button>
        </div>
        <div class="view-controls">
          <button class="icon-btn" title="Toggle Size" id="btn-toggle-size">
            <i data-lucide="zoom-in"></i>
          </button>
          <button class="icon-btn active" title="List View" id="btn-grid-view">
            <i data-lucide="list"></i>
          </button>
        </div>
      </header>

      <div id="dropzone" class="dropzone active glass-panel">
        <div class="dz-content">
          <div class="dz-icon-wrap">
            <i data-lucide="upload-cloud"></i>
          </div>
          <h3>Drag & Drop PDFs</h3>
          <p>or click to browse files</p>
        </div>
      </div>

      <div id="pages-container" class="pages-grid hidden">
        <!-- Page cards will be generated here dynamically -->
      </div>

      <!-- Loading Overlay -->
      <div id="loading-overlay" class="loading-overlay hidden glass-panel">
        <div class="spinner"></div>
        <p id="loading-text">Processing...</p>
      </div>
    </main>
  </div>

  <!-- Full Screen Modal -->
  <div id="fullscreen-modal" class="fullscreen-modal hidden">
    <div class="fs-header glass-panel">
      <div class="fs-title-wrap">
         <i data-lucide="file-text" class="text-secondary"></i>
         <span id="fs-file-label" class="fs-file-label">doc.pdf - Page 1</span>
      </div>
      <button class="icon-btn" id="fs-btn-close" title="Close"><i data-lucide="x"></i></button>
    </div>
    
    <div class="fs-workspace">
      <button class="icon-btn fs-nav prev" id="fs-btn-prev" title="Previous Page"><i data-lucide="chevron-left"></i></button>
      
      <div id="fs-render-container" class="fs-render-container">
        <canvas id="fs-canvas"></canvas>
        <div id="fs-text-layer" class="fs-text-layer"></div>
      </div>
      
      <button class="icon-btn fs-nav next" id="fs-btn-next" title="Next Page"><i data-lucide="chevron-right"></i></button>
    </div>

    <div class="fs-toolbar glass-panel">
      <button class="btn" id="fs-btn-zoom-out" title="Zoom Out">
        <i data-lucide="zoom-out"></i>
      </button>
      <button class="btn" id="fs-btn-zoom-in" title="Zoom In">
        <i data-lucide="zoom-in"></i>
      </button>
      <div class="fs-divider"></div>
      <button class="btn" id="fs-btn-rotate-left" title="Rotate Left">
        <i data-lucide="rotate-ccw"></i>
      </button>
      <button class="btn" id="fs-btn-rotate-right" title="Rotate Right">
        <i data-lucide="rotate-cw"></i>
      </button>
      <button class="btn danger" id="fs-btn-delete" title="Delete/Restore">
        <i data-lucide="trash-2"></i>
      </button>
    </div>
  </div>

  <!-- Template for a Page Card -->
  <template id="page-card-template">
    <div class="page-card">
      <div class="page-card-header">
        <label class="custom-checkbox">
          <input type="checkbox" class="page-select-checkbox">
          <span class="checkmark"></span>
        </label>
        <span class="page-number-badge">1</span>
      </div>
      <div class="canvas-wrap">
        <canvas class="page-canvas"></canvas>
        <div class="delete-overlay hidden">
          <i data-lucide="trash-2"></i>
        </div>
        <div class="card-action-overlay">
          <button class="mini-btn" title="View Full Screen" data-action="view-fullscreen"><i
              data-lucide="maximize"></i></button>
          <button class="mini-btn" title="Rotate Left" data-action="rotate-left"><i
              data-lucide="rotate-ccw"></i></button>
          <button class="mini-btn" title="Delete/Restore" data-action="toggle-delete"><i
              data-lucide="trash-2"></i></button>
          <button class="mini-btn" title="Rotate Right" data-action="rotate-right"><i
              data-lucide="rotate-cw"></i></button>
        </div>
      </div>
      <div class="page-card-footer">
        <span class="file-label">doc.pdf</span>
      </div>
    </div>
  </template>

  <script type="module" src="./main.js"></script>
</body>

</html>
